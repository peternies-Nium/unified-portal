<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unified Portal – Color Study</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f5f5f2; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px; }
.header { max-width: 900px; width: 100%; margin-bottom: 32px; }
h1 { font-size: 14px; font-weight: 500; color: #888780; letter-spacing: 0.5px; text-transform: uppercase; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; max-width: 900px; width: 100%; }
.card { background: #fff; border: 0.5px solid #d3d1c7; border-radius: 12px; overflow: hidden; text-decoration: none; color: inherit; transition: box-shadow 0.15s, transform 0.15s; }
.card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); transform: translateY(-2px); }
.swatch { height: 80px; display: flex; align-items: center; justify-content: center; }
.card-body { padding: 16px; border-top: 0.5px solid #e8e6e1; }
.card-label { font-size: 13px; font-weight: 500; color: #2c2c2a; margin-bottom: 4px; }
.card-hex { font-size: 11px; color: #888780; font-family: monospace; margin-bottom: 12px; }
.card-link { font-size: 12px; font-weight: 500; color: #4a7c3f; display: flex; align-items: center; gap: 4px; }
.card-link::after { content: "→"; }
</style>
</head>
<body>
<div class="header">
  <h1>Unified Portal – Color Study</h1>
</div>
<div class="grid">
  <a class="card" href="nium-portal-base/nium-dashboard.html">
    <div class="swatch" style="background:#e7e7df;"></div>
    <div class="card-body">
      <div class="card-label">Base</div>
      <div class="card-hex">#e7e7df</div>
      <div class="card-link">View dashboard</div>
    </div>
  </a>
  <a class="card" href="nium-portal-20-lighter/nium-dashboard.html">
    <div class="swatch" style="background:#eeeee8;"></div>
    <div class="card-body">
      <div class="card-label">20% lighter</div>
      <div class="card-hex">#eeeee8</div>
      <div class="card-link">View dashboard</div>
    </div>
  </a>
  <a class="card" href="nium-portal-40-lighter/nium-dashboard.html">
    <div class="swatch" style="background:#f5f5f2;"></div>
    <div class="card-body">
      <div class="card-label">40% lighter</div>
      <div class="card-hex">#f5f5f2</div>
      <div class="card-link">View dashboard</div>
    </div>
  </a>
  <a class="card" href="nium-portal-60-lighter/nium-dashboard.html">
    <div class="swatch" style="background:#f9f9f7;"></div>
    <div class="card-body">
      <div class="card-label">60% lighter</div>
      <div class="card-hex">#f9f9f7</div>
      <div class="card-link">View dashboard</div>
    </div>
  </a>
</div>
</body>
</html>
