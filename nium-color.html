<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nium Color</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f5f5f2; }
.topbar {
  position: sticky; top: 0; z-index: 10;
  background: #f5f5f2; border-bottom: 0.5px solid #d3d1c7;
  padding: 14px 32px; display: flex; align-items: center; gap: 12px;
}
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 500; color: #888780;
  text-decoration: none; transition: color 0.15s;
}
.back-link:hover { color: #2c2c2a; }
.page-title {
  font-size: 14px; font-weight: 500; color: #2c2c2a;
  letter-spacing: 0.3px;
}
.color-wrap {
  width: 100%;
  overflow-x: auto;
}
.color-wrap img {
  width: 100%;
  height: auto;
  display: block;
}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html" class="back-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Unified Portal
  </a>
  <span style="color:#d3d1c7;">|</span>
  <span class="page-title">Nium Color</span>
</div>
<div class="color-wrap">
  <img src="Color.png" alt="Nium Color Standard">
</div>
</body>
</html>
